name: Deploy Custom Code to Server

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy Staging via rsync
        if: github.ref == 'refs/heads/staging'
        run: |
          rsync -avz --delete \
            --exclude='.git*' \
            --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./wp-content/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/runcloud/webapps/myrehat-staging/wp-content/

      - name: Deploy Production via rsync
        if: github.ref == 'refs/heads/main'
        run: |
          rsync -avz --delete \
            --exclude='.git*' \
            --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./wp-content/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/runcloud/webapps/myrehat-prod/wp-content/
